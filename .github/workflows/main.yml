name: News Bot

on:
  schedule:
    - cron: '0 23 * * *'  # 한국 오전 8시
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - run: pip install feedparser newspaper3k requests

    - run: python main.py
